global:
  resolve_timeout: 5m
  telegram_api_url: https://api.telegram.org

templates:
  - /etc/alertmanager/templates/*.tmpl

route:
  group_by: ["alertname", "job"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  receiver: "telegram"

receivers:
  - name: "telegram"
    telegram_configs:
      - bot_token_file: /etc/alertmanager/secrets/telegram_bot_token
        chat_id: 0
        send_resolved: true
        parse_mode: ""
        message: '{{ template "telegram.home.message" . }}'
