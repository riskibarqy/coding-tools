services:
 postgres:
   image: postgres:15-alpine
   container_name: my-postgres
   restart: unless-stopped
   environment:
     POSTGRES_USER: ${POSTGRES_USER:-user}
     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
   ports:
     - "5432:5432"
   volumes:
     - postgres_data:/var/lib/postgresql/data
   networks: [backend-network]

 redis:
   image: redis:7-alpine
   container_name: my-redis
   restart: unless-stopped
   command:
     [
       "redis-server",
       "--requirepass",
       "changeme",
       "--save",
       "60",
       "1",
       "--loglevel",
       "warning"
     ]
   environment:
    REDIS_PASSWORD: changeme
   ports:
     - "127.0.0.1:6379:6379"
   volumes:
     - redis_data:/data
   networks: [backend-network]
   healthcheck:
     test:
       [
         "CMD",
         "redis-cli",
         "-a",
         "changeme",
         "ping"
       ]
     interval: 10s
     timeout: 5s
     retries: 5

 mongo:
   image: mongo:7.0
   container_name: my-mongo
   restart: unless-stopped
   environment:
     MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-mongo}
     MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-mongo}
   ports:
     - "27017:27017"
   volumes:
     - mongo_data:/data/db
   networks: [backend-network]

 kafka:
   image: confluentinc/cp-kafka:7.5.3
   container_name: my-kafka
   restart: unless-stopped
   ports:
     - "9092:9092"   # in-cluster listener (containers use my-kafka:9092)
     - "29092:29092" # host listener (host apps use localhost:29092)
   environment:
     KAFKA_SKIP_KRAFT_CHECKS: "true"
   volumes:
     - kafka_data:/var/lib/kafka/data
   networks: [backend-network]
   command:
     - bash
     - -c
     - |
        echo "Generating kraft.properties..."
        cat <<EOF > /tmp/kraft.properties
        process.roles=broker,controller
        node.id=1
        controller.quorum.voters=1@localhost:9093        
        listeners=PLAINTEXT://0.0.0.0:9092,HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
        advertised.listeners=PLAINTEXT://my-kafka:9092,HOST://localhost:29092
        controller.listener.names=CONTROLLER
        listener.security.protocol.map=PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
        inter.broker.listener.name=PLAINTEXT
        log.dirs=/var/lib/kafka/data
        # --- single-node must-haves ---
        offsets.topic.replication.factor=1
        transaction.state.log.replication.factor=1
        transaction.state.log.min.isr=1
        group.initial.rebalance.delay.ms=0
        EOF
        if [ ! -f "/var/lib/kafka/data/meta.properties" ]; then
          echo "Formatting Kafka storage..."
          kafka-storage format --ignore-formatted \
            --cluster-id jvMqlKDsTGuGiAd8t0Sk1Q \
            --config /tmp/kraft.properties
        fi
        echo "Starting Kafka with kraft.properties..."
        kafka-server-start /tmp/kraft.properties
   healthcheck:
     test: ["CMD", "bash", "-c", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
     interval: 5s
     timeout: 5s
     retries: 20

 kafdrop:
   image: obsidiandynamics/kafdrop:latest
   container_name: kafdrop
   restart: unless-stopped
   ports:
     - "9000:9000"
   environment:
     KAFKA_BROKERCONNECT: "my-kafka:9092"  # container -> kafka container
   depends_on:
     kafka:
       condition: service_healthy
   networks: [backend-network]

 mailhog:
  image: mailhog/mailhog:latest
  container_name: mailhog
  restart: unless-stopped
  ports:
    - "1025:1025" # SMTP
    - "8025:8025" # Web UI
  networks: [backend-network]

 elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - ELASTIC_PASSWORD=changeme
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks: [backend-network]
    ulimits:
      memlock:
        soft: -1
        hard: -1

 kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_SERVICEACCOUNTTOKEN=AAEAAWVsYXN0aWMva2liYW5hL2tpYmFuYS10b2tlbjpKUlVteFFnYVE1U3RyZUd3Vko4Yk13
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=77d78b335ab04575386c7ad1d275f834
      - XPACK_REPORTING_ENCRYPTIONKEY=a8dbe9710f7c2162067543e9d2a37e7e
      - XPACK_SECURITY_ENCRYPTIONKEY=30da3596eb3fb98c34792b33dc6e5fb5
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks: [backend-network]

 apm-server:
    image: docker.elastic.co/apm/apm-server:8.13.4
    container_name: apm-server
    command: >
      apm-server -e
      -E apm-server.secret_token=supersecret
      -E apm-server.host=0.0.0.0:8200
      -E output.elasticsearch.hosts=["http://elasticsearch:9200"]
      -E output.elasticsearch.username=elastic
      -E output.elasticsearch.password=changeme
    ports:
      - "8200:8200"
    depends_on:
      - elasticsearch
    networks: [backend-network]

 pyroscope:
   image: grafana/pyroscope:latest
   container_name: pyroscope
   restart: unless-stopped
   ports:
     - "4040:4040"
   volumes:
     - pyroscope_data:/var/lib/pyroscope
   environment:
     PYROSCOPE_LOG_LEVEL: info
   command:
     - server
     - --storage-path=/var/lib/pyroscope
     - --retention=7d
   networks: [backend-network]

 kafka-ui:
   image: provectuslabs/kafka-ui:latest
   container_name: kafka-ui
   restart: unless-stopped
   ports:
     - "8201:8080"  # map host 8201 to container 8080 (default)
   environment:
     KAFKA_CLUSTERS_0_NAME: local-kafka
     KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "my-kafka:9092"  # container -> kafka container
   depends_on:
     kafka:
       condition: service_healthy
   networks: [backend-network]

 vault:
   image: hashicorp/vault:1.15
   container_name: vault
   restart: unless-stopped
   ports:
     - "8202:8202"
   environment:
     VAULT_DEV_ROOT_TOKEN_ID: root
     VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8202
   cap_add: [IPC_LOCK]
   networks: [backend-network]
   command: "server -dev"


 redis-insight:
   image: redis/redisinsight:latest
   container_name: redis-insight
   restart: unless-stopped
   ports:
     - "5540:5540"
   environment:
     RIHOST: redis
     RIPORT: 6379
     RIPASSWORD: changeme
   networks: [backend-network]
   depends_on:
     redis:
       condition: service_healthy


volumes:
 postgres_data:
 redis_data:
 kafka_data:
 mongo_data:
 es_data:
 pyroscope_data:

networks:
 backend-network:
   driver: bridge
